<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuxoFlix</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<div id="navbar">
  <div class="logo-big">Luxo<span>Flix</span></div>
  <div class="nav-spacer"></div>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Pesquisar filmes..." />
  </div>
</div>

<!-- HERO -->
<section id="hero-section">
  <img id="hero-bg" />
  <div class="hero-grad1"></div>
  <div class="hero-grad2"></div>
  <div class="hero-content">
    <span class="hero-badge" id="hero-badge"></span>
    <h1 id="hero-title"></h1>
    <p id="hero-overview"></p>
    <div class="hero-btns">
      <button class="btn btn-primary" id="hero-watch">Assistir</button>
    </div>
  </div>
</section>

<!-- ROWS -->
<div class="rows-wrap" id="movies-section">
  <h2 class="section-title">Filmes Populares</h2>
  <div class="row-scroll" id="movies-row"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-media" id="modal-media"></div>
    <button class="modal-close" id="modal-close">×</button>
    <div class="modal-body">
      <img class="modal-poster" id="modal-poster" />
      <div class="modal-info">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-genres" id="modal-genres"></div>
        <p class="modal-overview" id="modal-overview"></p>
      </div>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/modal.js"></script>
<script src="js/search.js"></script>
</body>
</html>
